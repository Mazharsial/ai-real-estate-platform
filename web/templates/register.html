{% extends "base.html" %}
{% block title %}Register — DealFinder AI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm"><div class="card-body p-4">
      <h1 class="h4 fw-bold mb-3">Create your account</h1>
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
          <label class="form-label">Full name</label>
          <input class="form-control" name="full_name" placeholder="Jane Investor">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" minlength="8" required>
          <div class="form-text">At least 8 characters.</div>
        </div>
        <button class="btn btn-brand w-100">Create account</button>
      </form>
      <p class="small text-muted mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Sign in</a>.</p>
    </div></div>
  </div>
</div>
{% endblock %}
