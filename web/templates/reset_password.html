{% extends "base.html" %}
{% block title %}Set a new password — DealFinder AI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm"><div class="card-body p-4">
      <h1 class="h4 fw-bold mb-3">Set a new password</h1>
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="mb-3">
          <label class="form-label">New password</label>
          <input class="form-control" type="password" name="new_password" minlength="8" required autofocus>
          <div class="form-text">At least 8 characters.</div>
        </div>
        <button class="btn btn-brand w-100">Update password</button>
      </form>
      <p class="small text-muted mt-3 mb-0"><a href="{{ url_for('login') }}">← Back to login</a></p>
    </div></div>
  </div>
</div>
{% endblock %}
