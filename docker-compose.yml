services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: realestate
      POSTGRES_PASSWORD: realestate
      POSTGRES_DB: realestate_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://realestate:realestate@db:5432/realestate_platform
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      API_BASE_URL: http://api:8000
      FLASK_SECRET_KEY: change-me
    depends_on:
      - api
    ports:
      - "5001:5001"

volumes:
  pgdata:
