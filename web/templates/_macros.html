{% macro mini(p) %}
<a href="{{ url_for('detail', pid=p.id) }}" class="card deal-mini text-decoration-none h-100">
  <div class="d-flex h-100">
    <div class="mini-img" style="background-image:url('{{ p.image_url }}')"></div>
    <div class="p-2 flex-grow-1 overflow-hidden">
      <div class="d-flex justify-content-between align-items-center">
        <b>{{ p.price|money }}</b>
        <span class="badge score-{{ 'hi' if p.investment_score>=70 else 'mid' if p.investment_score>=55 else 'lo' }}">{{ p.investment_score }}</span>
      </div>
      <div class="small text-truncate text-body-secondary">{{ p.address }}</div>
      <div class="text-muted" style="font-size:.72rem">
        {{ p.beds }}bd · {{ p.rental_yield }}% yield{% if (p.undervalued_pct or 0) > 0 %} · {{ p.undervalued_pct }}% under{% endif %}
      </div>
    </div>
  </div>
</a>
{% endmacro %}
