{% extends "base.html" %}
{% block title %}Login — DealFinder AI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm"><div class="card-body p-4">
      <h1 class="h4 fw-bold mb-3">Welcome back</h1>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-brand w-100">Sign in</button>
      </form>
      <p class="small text-muted mt-3 mb-0">No account? <a href="{{ url_for('register') }}">Create one</a>.</p>
    </div></div>
  </div>
</div>
{% endblock %}
